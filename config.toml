baseURL = "https://adilio.ca/"
languageCode = "en-us"
title = "Adil Leghari"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
pluralizeListTitles = false
disableKinds = ["taxonomy", "term"]

[pagination]
  pagerSize = 20

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  description = "Cloud architect. Builder. Security thinker."
  author = "Adil Leghari"

  [params.identity]
    positioning = "I build and secure the infrastructure that organizations depend on."
    metadata = "Vancouver, BC · Senior Solutioneer @ Wiz"

  [params.currently]
    text = "Focused on cloud security architecture — helping teams understand their real risk surface and build resilient systems from the ground up."
    date = "April 2026"

  [params.about]
    teaser = "I started in a neuroscience research lab, moved through sysadmin work, package management, and IAM, and now work in cloud security at Wiz. The thread has always been systems — and what happens when they fail."

[menu]
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 10

  [[menu.main]]
    identifier = "writing"
    name = "Writing"
    url = "/writing/"
    weight = 20

  [[menu.main]]
    identifier = "projects"
    name = "Projects"
    url = "/projects/"
    weight = 30

  [[menu.main]]
    identifier = "appearances"
    name = "Appearances"
    url = "/appearances/"
    weight = 40

[outputs]
  home = ["HTML", "RSS"]

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    noClasses = false
    style = "github"

  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
